name: Release

# Build all browser variants at the tag version, upload to Cloudflare R2,
# and create a GitHub Release with public download URLs.
#
# Required secrets:
#   R2_ACCOUNT_ID         — Cloudflare R2 account id (used to derive S3 endpoint)
#   R2_BUCKET             — R2 bucket name
#   R2_ACCESS_KEY_ID      — R2 access key id
#   R2_SECRET_ACCESS_KEY  — R2 secret access key
#   R2_PUBLIC_BASE_URL    — public base URL (e.g. https://pub-XXXX.r2.dev)

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
      R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}

    steps:
      - uses: actions/checkout@v7

      - name: Derive version
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          # Chrome manifest requires 4 segments: M.m.p.build
          DOTS=$(printf '%s' "$VERSION" | tr -cd '.' | wc -c)
          while [ "$DOTS" -lt 3 ]; do VERSION="${VERSION}.0"; DOTS=$((DOTS + 1)); done
          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
            echo "prefix=releases/${TAG}"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build legal report
        run: npm run license-report:html

      - name: Build all extension variants
        run: npm run build -- --all --version "${{ steps.ver.outputs.version }}"

      - name: Verify required artifacts exist
        run: |
          set -e
          for V in chrome chrome-dev edge firefox firefox-dev; do
            test -f "builds/yomitan-${V}.zip" || { echo "missing builds/yomitan-${V}.zip"; ls -la builds/; exit 1; }
          done
          ls -la builds/

      - name: Install AWS CLI v2
        # Ubuntu apt no longer ships an `awscli` package; use the official
        # standalone installer instead. ~30 MB, ~5 s on a hot runner.
        run: |
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          sudo /tmp/aws/install --update
          aws --version

      - name: Upload to R2 (versioned + latest mirror)
        run: |
          set -e
          PREFIX="${{ steps.ver.outputs.prefix }}"
          for V in chrome chrome-dev edge firefox firefox-dev; do
            FILE="builds/yomitan-${V}.zip"

            # Versioned path: immutable once published — cache for a year.
            KEY="${PREFIX}/yomitan-${V}.zip"
            echo "uploading ${FILE} -> s3://${R2_BUCKET}/${KEY}"
            aws s3 cp "${FILE}" "s3://${R2_BUCKET}/${KEY}" \
              --endpoint-url "${R2_ENDPOINT_URL}" \
              --content-type application/zip \
              --cache-control "public, max-age=31536000, immutable" \
              --no-progress

            # `latest` mirror: short cache so a new release propagates fast.
            LATEST_KEY="releases/latest/yomitan-${V}.zip"
            echo "mirroring ${FILE} -> s3://${R2_BUCKET}/${LATEST_KEY}"
            aws s3 cp "${FILE}" "s3://${R2_BUCKET}/${LATEST_KEY}" \
              --endpoint-url "${R2_ENDPOINT_URL}" \
              --content-type application/zip \
              --cache-control "public, max-age=60" \
              --no-progress
          done

      - name: Generate and upload latest.json manifest
        run: |
          set -e
          TAG="${{ steps.ver.outputs.tag }}"
          PREFIX="${{ steps.ver.outputs.prefix }}"
          VERSION="${{ steps.ver.outputs.version }}"
          RELEASED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          variants='{}'
          for V in chrome chrome-dev edge firefox firefox-dev; do
            FILE="builds/yomitan-${V}.zip"
            URL="${R2_PUBLIC_BASE_URL}/${PREFIX}/yomitan-${V}.zip"
            LATEST_URL="${R2_PUBLIC_BASE_URL}/releases/latest/yomitan-${V}.zip"
            SHA=$(sha256sum "${FILE}" | awk '{print $1}')
            SIZE=$(stat -c '%s' "${FILE}")
            variants=$(jq \
              --arg k "$V" \
              --arg url "$URL" \
              --arg lurl "$LATEST_URL" \
              --arg sha "$SHA" \
              --argjson size "$SIZE" \
              '. + {($k): {url: $url, latest_url: $lurl, sha256: $sha, size: $size}}' \
              <<<"$variants")
          done

          jq -n \
            --arg version "$TAG" \
            --arg version_number "$VERSION" \
            --arg released_at "$RELEASED_AT" \
            --argjson variants "$variants" \
            '{
              version: $version,
              version_number: $version_number,
              released_at: $released_at,
              variants: $variants
            }' \
            > /tmp/latest.json

          echo "--- latest.json ---"
          cat /tmp/latest.json

          aws s3 cp /tmp/latest.json "s3://${R2_BUCKET}/releases/latest.json" \
            --endpoint-url "${R2_ENDPOINT_URL}" \
            --content-type application/json \
            --cache-control "public, max-age=60" \
            --no-progress

      - name: Upload Firefox update manifest (Mozilla format)
        # Mozilla `update_url` polled by Firefox for installed extensions.
        # The manifest is maintained by hand at releases/firefox-updates.json
        # — bumped per release with a new entry + signed XPI URL. We just
        # ship it to a stable R2 path so Firefox installs can poll it.
        # Signed XPI itself (referenced as update_link in the JSON) is
        # uploaded manually by the maintainer after AMO signing — see
        # scripts/firefox-publish-signed.sh.
        run: |
          set -e
          aws s3 cp releases/firefox-updates.json \
            "s3://${R2_BUCKET}/releases/firefox-updates.json" \
            --endpoint-url "${R2_ENDPOINT_URL}" \
            --content-type application/json \
            --cache-control "public, max-age=300" \
            --no-progress
          echo "Firefox update manifest published at:"
          echo "  ${R2_PUBLIC_BASE_URL}/releases/firefox-updates.json"

      - name: Compose release notes
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          PREFIX="${{ steps.ver.outputs.prefix }}"
          {
            echo "## Builds (${TAG})"
            echo
            echo "All variants are unsigned. See README for install instructions."
            echo
            echo "**Programmatic consumption:**"
            echo "- Manifest: \`${R2_PUBLIC_BASE_URL}/releases/latest.json\`"
            echo "- Floating latest: \`${R2_PUBLIC_BASE_URL}/releases/latest/yomitan-<variant>.zip\`"
            echo
            echo "| Variant | Browser | Pinned URL | Latest URL |"
            echo "| --- | --- | --- | --- |"
            for V in chrome chrome-dev edge firefox firefox-dev; do
              case "$V" in
                chrome)      LABEL='Chrome / Opera / Brave / Vivaldi' ;;
                chrome-dev)  LABEL='Chromium dev mode' ;;
                edge)        LABEL='Microsoft Edge' ;;
                firefox)     LABEL='Firefox release / ESR' ;;
                firefox-dev) LABEL='Firefox Developer / Nightly' ;;
              esac
              PINNED="${R2_PUBLIC_BASE_URL}/${PREFIX}/yomitan-${V}.zip"
              LATEST="${R2_PUBLIC_BASE_URL}/releases/latest/yomitan-${V}.zip"
              echo "| ${V} | ${LABEL} | [${PINNED}](${PINNED}) | [${LATEST}](${LATEST}) |"
            done
          } > release-notes.md
          cat release-notes.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          # Idempotent: if the release exists (e.g. tag was re-pushed),
          # delete it first so `gh release create` doesn't fail.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG exists — replacing"
            gh release delete "$TAG" --yes
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md
